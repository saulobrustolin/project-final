<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notificação de budget</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
    <div style="background-color: #fff; padding: 20px; border-radius: 8px;">
        <h2>Olá, <span th:text="${fullname}">Usuário</span>!</h2>
        <p>Meus parabéns, você acabou de atingir a sua meta <span th:text="${description}">Meta</span>!</p>
        
        <p>Mais uma conquista para sua conta, como vamos comemorar!</p>
        
        <p style="color: #888; font-size: 12px;">Enviado automaticamente por caixinha.</p>
    </div>
</body>
</html>

spring:
  application:
    name: notification-consumer

---
spring:
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10

resend:
  api:
    key: ${RESEND_KEY}
  from: ${RESEND_FROM}